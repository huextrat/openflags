# ------------------------------------------------------------------------------
# Release — runs on every push to main.
# Uses changesets/action to:
# 1. Create or update a "Version Packages" PR (bump versions + changelogs).
# 2. When that PR is merged, publish updated packages to npm (requires NPM_TOKEN).
# Docs: https://github.com/changesets/changesets — Action: https://github.com/changesets/action
# ------------------------------------------------------------------------------

name: 🚀 Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: 📦 Version or Publish
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🍞 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 🟢 Setup Node (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🚀 Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
