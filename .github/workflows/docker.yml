# Build/push OpenFlags to Docker Hub. Manual run: bump patch/minor/major from latest @openflagsdev/docker@* tag, push :version + :latest, tag repo. Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN. First run (no tag): 0.1.0 — seed with git tag '@openflagsdev/docker@0.1.0'.

name: 🐳 Docker

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump for the Docker image tag"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  docker:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed to read git tags

      - name: 📌 Compute next version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          LATEST_TAG=$(git tag --list '@openflagsdev/docker@*' --sort=-v:refname | head -n1)

          if [ -z "$LATEST_TAG" ]; then
            NEXT_VERSION="0.1.0"
          else
            CURRENT="${LATEST_TAG#@openflagsdev/docker@}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            MAJOR=${MAJOR:-0}
            MINOR=${MINOR:-0}
            PATCH=${PATCH:-0}
            case "$BUMP" in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              patch|*)
                PATCH=$((PATCH + 1))
                ;;
            esac
            NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=@openflagsdev/docker@${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "🐳 Bump=${BUMP} → Docker version: ${NEXT_VERSION}"

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🐳 Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/openflags:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/openflags:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🏷️ Create next Docker tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
