# ------------------------------------------------------------------------------
# PR checks — runs on every pull request targeting main.
# - 📋 Ensures a changeset when packages/ are modified (changeset status).
# - 🪲 Lint with Oxc (oxlint).
# - ✨ Format check with Oxc (oxfmt --check).
# - 🔨 Monorepo build.
# - 🧪 Unit/integration tests (Bun test).
# ------------------------------------------------------------------------------

name: 🔍 PR checks

on:
  pull_request:
    branches: [main]

jobs:
  changeset-required:
    name: 📋 Changeset required
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🍞 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 📋 Check for required changeset
        run: bunx changeset status --since=origin/${{ github.base_ref }}

  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🍞 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔨 Build
        run: bun run build

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🍞 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🧪 Run tests
        run: bun run test

  lint:
    name: 🪲 Lint
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🍞 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🪲 Run oxlint
        run: bun run lint

  format:
    name: ✨ Format
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🍞 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: ✨ Check formatting (oxfmt)
        run: bun run fmt:check
